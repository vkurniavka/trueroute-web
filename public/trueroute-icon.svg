<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a6dd4"/>
      <stop offset="100%" stop-color="#0d3b78"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd740"/>
      <stop offset="100%" stop-color="#f5c400"/>
    </linearGradient>
  </defs>
  
  <!-- Shield -->
  <path d="
    M 256 52
    L 420 52
    C 436 52 448 64 448 80
    L 448 272
    C 448 350 386 410 256 464
    C 126 410 64 350 64 272
    L 64 80
    C 64 64 76 52 92 52
    Z
  " fill="url(#shieldGrad)"/>
  
  <!-- Shield top highlight -->
  <path d="
    M 256 52
    L 420 52
    C 436 52 448 64 448 80
    L 448 140
    C 340 128 256 124 256 124
    C 256 124 172 128 64 140
    L 64 80
    C 64 64 76 52 92 52
    Z
  " fill="#2680eb" opacity="0.3"/>
  
  <!-- Compass ring -->
  <circle cx="256" cy="235" r="108" fill="none" stroke="#ffd740" stroke-width="3" opacity="0.4"/>
  
  <!-- Cardinal ticks -->
  <g stroke="#ffd740" stroke-width="3.5" stroke-linecap="round" opacity="0.8">
    <line x1="256" y1="135" x2="256" y2="160"/>
    <line x1="256" y1="310" x2="256" y2="335"/>
    <line x1="356" y1="235" x2="331" y2="235"/>
    <line x1="156" y1="235" x2="181" y2="235"/>
  </g>
  
  <!-- North needle (gold) -->
  <polygon points="256,145 236,248 256,232 276,248" fill="url(#goldGrad)"/>
  
  <!-- South needle (blue) -->
  <polygon points="256,325 236,248 256,258 276,248" fill="#0a2850" opacity="0.65"/>
  
  <!-- Center hub -->
  <circle cx="256" cy="248" r="12" fill="#ffd740"/>
  <circle cx="256" cy="248" r="6" fill="#0d3b78"/>
  
  <!-- N label -->
  <text x="256" y="130" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', sans-serif" font-size="26" font-weight="800" fill="#ffd740" opacity="0.9">N</text>
  
  <!-- Route accent at bottom -->
  <path d="M 200 382 Q 228 366 256 372 Q 284 378 312 382" fill="none" stroke="#ffd740" stroke-width="3.5" stroke-linecap="round" opacity="0.65"/>
  
  <!-- Shield outline -->
  <path d="
    M 256 52
    L 420 52
    C 436 52 448 64 448 80
    L 448 272
    C 448 350 386 410 256 464
    C 126 410 64 350 64 272
    L 64 80
    C 64 64 76 52 92 52
    Z
  " fill="none" stroke="#ffd740" stroke-width="2.5" opacity="0.25"/>
</svg>
