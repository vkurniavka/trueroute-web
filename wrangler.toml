name = "trueroute-web"
compatibility_date = "2024-09-23"

# Required for @aws-sdk/client-s3 and other Node.js-style imports in
# Cloudflare Workers edge runtime. Without this, the /api/data/index route
# will fail at runtime because the SDK uses Node.js stream/crypto APIs.
compatibility_flags = ["nodejs_compat"]

# Output directory produced by `pnpm exec next-on-pages`
pages_build_output_dir = ".vercel/output/static"

[vars]
# Public environment variables — safe to commit.
# Secrets (R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, CLOUDFLARE_API_TOKEN, etc.)
# must be set in the Cloudflare Pages dashboard or via `wrangler secret put`.
NEXT_PUBLIC_PLAY_STORE_URL = ""

# ---------------------------------------------------------------------------
# R2 bucket binding
# DO NOT change the binding name or bucket_name — the mobile app and scripts
# rely on the exact bucket name "trueroute-data".
# ---------------------------------------------------------------------------
[[r2_buckets]]
binding = "TRUEROUTE_DATA"
bucket_name = "trueroute-data"
preview_bucket_name = "trueroute-data"

# ---------------------------------------------------------------------------
# D1 database binding
# After creating the database with `wrangler d1 create trueroute-d1`,
# replace the placeholder database_id below with the real UUID.
# Then apply the migration: `wrangler d1 migrations apply trueroute-d1`
# ---------------------------------------------------------------------------
[[d1_databases]]
binding = "TRUEROUTE_DB"
database_name = "trueroute-d1"
database_id = "69f61266-c028-4d81-939b-548183540577"

# ---------------------------------------------------------------------------
# ---------------------------------------------------------------------------
# Rate limiting: Cloudflare Pages does not support [[unsafe.bindings]].
# RATE_LIMITER is optional in validateApiKey() — rate limiting is silently
# skipped when the binding is absent (graceful degradation).
#
# To enforce rate limits in production, configure a Cloudflare WAF Rate
# Limiting rule in the CF dashboard:
#   Security → WAF → Rate limiting rules → Create rule
#   Match: URI Path contains /api/  |  Rate: 100 req / 60s per IP
# ---------------------------------------------------------------------------
